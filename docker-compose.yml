version: '3.8'

services:
  backend:
    build:
      context: ./backend/node-server
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  frontend:
    build:
      context: ./frontend/react-app
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-network
    restart: always

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - ai-network
    volumes:
      - mongo-data:/data/db

networks:
  ai-network:
    driver: bridge

volumes:
  mongo-data:
